<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post a Job - FreelanceHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="index.html"><i class="fa-solid fa-briefcase"></i> FreelanceHub</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="browse-jobs.html">Browse Jobs</a></li>
          <li class="nav-item"><a class="nav-link" href="find-work.html">Find Work</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <h2 class="mb-4">Post a New Job</h2>
      <form id="postJobForm">
        <div class="mb-3">
          <label for="jobTitle" class="form-label">Job Title</label>
          <input type="text" class="form-control" id="jobTitle" placeholder="e.g. Full Stack Developer Needed" required />
        </div>
        <div class="mb-3">
          <label for="jobDescription" class="form-label">Job Description</label>
          <textarea class="form-control" id="jobDescription" rows="6" placeholder="Detailed description of your project" required></textarea>
        </div>
        <div class="mb-3">
          <label for="jobCategory" class="form-label">Category</label>
          <select class="form-select" id="jobCategory" required>
            <option value="">Select Category</option>
            <option>Web Development</option>
            <option>Mobile Development</option>
            <option>Design & Creative</option>
            <option>Writing & Translation</option>
            <option>Sales & Marketing</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="jobBudget" class="form-label">Budget ($)</label>
          <input type="number" class="form-control" id="jobBudget" placeholder="e.g. 1500" required />
        </div>
        <div class="mb-3">
          <label for="projectLength" class="form-label">Project Length</label>
          <select class="form-select" id="projectLength" required>
            <option value="">Select Duration</option>
            <option>Less than 1 month</option>
            <option>1 to 3 months</option>
            <option>3 to 6 months</option>
            <option>More than 6 months</option>
          </select>
        </div>

        <button type="submit" class="btn btn-success">Post Job</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 FreelanceHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
